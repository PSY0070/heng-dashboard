<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>H Engineering 프로젝트 대시보드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Malgun Gothic', '맑은 고딕', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

.header {
  background: linear-gradient(135deg, #1a1f2e, #16213e);
  border-bottom: 1px solid #2d3550;
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.header h1 { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; }
.header h1 span { color: #4f8ef7; }
.header-stats { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.stat-pill {
  background: rgba(79,142,247,0.12); border: 1px solid rgba(79,142,247,0.25);
  border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #8bafd4; white-space: nowrap;
}
.stat-pill b { color: #4f8ef7; }

.controls {
  background: #13182a; border-bottom: 1px solid #1e2740;
  padding: 10px 14px; display: flex; flex-direction: column; gap: 8px;
}
.filter-row { display: flex; align-items: flex-start; gap: 8px; }
.filter-label { font-size: 10px; color: #5a6a8a; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; min-width: 44px; padding-top: 6px; }
.btn-row { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }

.btn {
  padding: 5px 11px; border-radius: 6px; border: 1px solid #2a3452;
  background: #1a2035; color: #8bafd4; font-size: 11.5px; cursor: pointer;
  transition: all 0.15s; font-family: inherit; white-space: nowrap; line-height: 1.3;
  -webkit-user-select: none; user-select: none;
}
.btn:active { transform: scale(0.96); }
.btn.active { background: #2a3d6e; border-color: #4f8ef7; color: #a8ceff; font-weight: 600; }
.btn[data-value="현장영업"].active { background: #1e3d6e; border-color: #3a7bd5; color: #90c4ff; }
.btn[data-value="설계영업"].active { background: #1a4d30; border-color: #2e9e5a; color: #80e4a0; }
.btn[data-value="견적영업"].active { background: #5a2e10; border-color: #c4682e; color: #f5b07a; }

.search-row { display: flex; gap: 6px; align-items: center; padding-top: 2px; }
.search-row input {
  flex: 1; background: #1a2035; border: 1px solid #2a3452; border-radius: 6px;
  padding: 7px 11px; color: #e0e0e0; font-size: 12.5px; font-family: inherit; outline: none; min-width: 0;
}
.search-row input:focus { border-color: #4f8ef7; }
.sort-select {
  background: #1a2035; border: 1px solid #2a3452; border-radius: 6px;
  padding: 6px 8px; color: #8bafd4; font-size: 11.5px; cursor: pointer; font-family: inherit; outline: none;
}

.result-bar {
  padding: 6px 14px; background: #0f1117; border-bottom: 1px solid #1a2035;
  font-size: 11px; color: #5a6a8a;
}
.result-bar b { color: #8bafd4; }

.card-list { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
.card {
  background: #13182a; border: 1px solid #1e2740; border-radius: 10px;
  padding: 13px 14px; cursor: pointer; transition: background 0.12s, border-color 0.12s;
}
.card:active { background: #1a2240; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-title { font-size: 13.5px; font-weight: 700; color: #d8e8ff; line-height: 1.4; }
.card-company { font-size: 11px; color: #5a6a8a; margin-top: 2px; }
.card-badges { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

.tag-section { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10.5px; font-weight: 600; white-space: nowrap; }
.tag-현장영업 { background: rgba(58,123,213,0.2); color: #7ab8ff; border: 1px solid rgba(58,123,213,0.4); }
.tag-설계영업 { background: rgba(46,158,90,0.2); color: #6ee09a; border: 1px solid rgba(46,158,90,0.4); }
.tag-견적영업 { background: rgba(196,104,46,0.2); color: #f5b065; border: 1px solid rgba(196,104,46,0.4); }

.urgency-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10.5px; font-weight: 600; white-space: nowrap; }
.u-긴급 { background: rgba(220,50,50,0.2); color: #ff7070; border: 1px solid rgba(220,50,50,0.4); }
.u-중요 { background: rgba(220,130,30,0.2); color: #ffb060; border: 1px solid rgba(220,130,30,0.4); }
.u-보통 { background: rgba(200,180,30,0.2); color: #f0d060; border: 1px solid rgba(200,180,30,0.4); }
.u-여유 { background: rgba(50,180,80,0.2); color: #60e090; border: 1px solid rgba(50,180,80,0.4); }
.u-미정 { background: rgba(80,80,100,0.2); color: #8090a0; border: 1px solid rgba(80,80,100,0.4); }

.card-meta { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-bottom: 7px; }
.card-meta-item { font-size: 11.5px; color: #7090b0; }
.card-meta-item b { color: #8bafd4; font-weight: 600; }
.card-status {
  font-size: 11px; color: #5a6a8a; line-height: 1.6;
  border-top: 1px solid #1e2740; padding-top: 7px; margin-top: 4px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.table-wrap { padding: 12px 14px; overflow-x: auto; display: none; }
table { width: 100%; border-collapse: separate; border-spacing: 0 3px; font-size: 12px; min-width: 900px; }
thead th {
  background: #13182a; color: #5a6a8a; font-weight: 600; text-align: left;
  padding: 8px 11px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.5px;
  position: sticky; top: 0; z-index: 10;
}
tbody tr { background: #13182a; cursor: pointer; transition: background 0.1s; }
tbody tr:hover { background: #1a2240; }
tbody td { padding: 9px 11px; border-top: 1px solid #1a2035; border-bottom: 1px solid #1a2035; vertical-align: top; line-height: 1.5; }
tbody td:first-child { border-left: 1px solid #1a2035; border-radius: 6px 0 0 6px; }
tbody td:last-child { border-right: 1px solid #1a2035; border-radius: 0 6px 6px 0; }
.status-text { font-size: 11px; color: #7080a0; max-width: 280px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.view-toggle {
  position: fixed; bottom: 20px; right: 16px; z-index: 500;
  background: #4f8ef7; color: #fff; border: none; border-radius: 28px;
  padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
  box-shadow: 0 4px 16px rgba(79,142,247,0.4); font-family: inherit;
}

.no-results { text-align: center; padding: 50px 20px; color: #3a4a6a; font-size: 13px; }

.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 1000;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #1a2035; border: 1px solid #2d3550;
  border-radius: 16px 16px 0 0;
  width: 100%; max-width: 680px; max-height: 88vh;
  overflow-y: auto; padding: 20px 18px 32px;
  position: relative; animation: slideUp 0.22s ease;
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 36px; height: 4px; background: #2d3550; border-radius: 2px; margin: 0 auto 16px; }
.modal-close {
  position: absolute; top: 14px; right: 16px;
  background: #1e2740; border: none; color: #8bafd4; width: 28px; height: 28px;
  border-radius: 50%; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.modal h2 { font-size: 16px; color: #d8e8ff; margin-bottom: 14px; padding-right: 30px; line-height: 1.4; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.modal-field label { font-size: 10px; color: #4e5e7a; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-field p { font-size: 12.5px; color: #c0d0e8; margin-top: 2px; line-height: 1.4; }
.modal-section-title {
  font-size: 10.5px; color: #4f8ef7; text-transform: uppercase; letter-spacing: 0.8px;
  margin: 14px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #2d3550;
}
.modal-status {
  font-size: 12px; color: #8bafd4; line-height: 1.8; white-space: pre-wrap;
  background: #0f1520; border-radius: 8px; padding: 12px 14px;
  border: 1px solid #1e2740; max-height: 260px; overflow-y: auto;
}

@media (min-width: 700px) {
  .controls { padding: 12px 20px; }
  .card-list { padding: 12px 18px; }
  .table-wrap { padding: 12px 18px; }
  .header { padding: 16px 22px; }
  .header h1 { font-size: 17px; }
  .modal { border-radius: 14px; margin: auto; }
  .modal-overlay { align-items: center; }
}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ <span>H ENG</span> 영업 대시보드</h1>
  <div class="header-stats">
    <div class="stat-pill">전체 <b id="total-count">0</b></div>
    <div class="stat-pill">현장 <b id="field-count" style="color:#7ab8ff">0</b></div>
    <div class="stat-pill">설계 <b id="design-count" style="color:#6ee09a">0</b></div>
    <div class="stat-pill">견적 <b id="estimate-count" style="color:#f5b065">0</b></div>
  </div>
</div>

<div class="controls">
  <div class="filter-row">
    <div class="filter-label">유형</div>
    <div class="btn-row">
      <button class="btn active" data-filter="section" data-value="ALL" onclick="setFilter(this)">전체</button>
      <button class="btn" data-filter="section" data-value="현장영업" onclick="setFilter(this)">🏗 현장</button>
      <button class="btn" data-filter="section" data-value="설계영업" onclick="setFilter(this)">📐 설계</button>
      <button class="btn" data-filter="section" data-value="견적영업" onclick="setFilter(this)">💰 견적</button>
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-label">긴급도</div>
    <div class="btn-row">
      <button class="btn active" data-filter="urgency" data-value="ALL" onclick="setFilter(this)">전체</button>
      <button class="btn" data-filter="urgency" data-value="긴급" onclick="setFilter(this)">🔴 긴급</button>
      <button class="btn" data-filter="urgency" data-value="중요" onclick="setFilter(this)">🟠 중요</button>
      <button class="btn" data-filter="urgency" data-value="보통" onclick="setFilter(this)">🟡 보통</button>
      <button class="btn" data-filter="urgency" data-value="여유" onclick="setFilter(this)">🟢 여유</button>
      <button class="btn" data-filter="urgency" data-value="미정" onclick="setFilter(this)">⚪ 미정</button>
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-label">설계사</div>
    <div class="btn-row" id="designer-filters">
      <button class="btn active" data-filter="designer" data-value="ALL" onclick="setFilter(this)">전체</button>
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-label">시공사</div>
    <div class="btn-row" id="contractor-filters">
      <button class="btn active" data-filter="contractor" data-value="ALL" onclick="setFilter(this)">전체</button>
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-label">진행업체</div>
    <div class="btn-row" id="company-filters">
      <button class="btn active" data-filter="company" data-value="ALL" onclick="setFilter(this)">전체</button>
    </div>
  </div>
  <div class="search-row">
    <input type="search" id="search-input" placeholder="🔍 프로젝트 / 설계사 / 시공사 검색" oninput="render()">
    <select class="sort-select" id="sort-select" onchange="render()">
      <option value="urgency">준공일순</option>
      <option value="section">유형순</option>
      <option value="project">이름순</option>
    </select>
  </div>
</div>

<div class="result-bar"><b id="result-count">0</b>건 표시 중</div>
<div class="card-list" id="card-list"></div>
<div class="table-wrap" id="table-wrap">
  <table>
    <thead><tr>
      <th>유형</th><th>긴급도</th><th>프로젝트명</th><th>준공일</th>
      <th>설계사</th><th>시공사</th><th>설비사</th><th>건물종류</th><th>최근 진행사항</th>
    </tr></thead>
    <tbody id="table-body"></tbody>
  </table>
</div>
<div class="no-results" id="no-results" style="display:none">조건에 맞는 프로젝트가 없습니다.</div>
<button class="view-toggle" id="view-btn" onclick="toggleView()">📋 테이블뷰</button>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <h2 id="modal-title"></h2>
    <div class="modal-grid">
      <div class="modal-field"><label>영업유형</label><p id="m-section"></p></div>
      <div class="modal-field"><label>긴급도 / 준공일</label><p id="m-urgency"></p></div>
      <div class="modal-field"><label>진행업체</label><p id="m-company"></p></div>
      <div class="modal-field"><label>건물종류 / 연면적</label><p id="m-building"></p></div>
      <div class="modal-field"><label>제어방식</label><p id="m-control"></p></div>
      <div class="modal-field"><label>MFD 수량</label><p id="m-mfd"></p></div>
    </div>
    <div class="modal-section-title">관련 업체</div>
    <div class="modal-grid">
      <div class="modal-field"><label>설계사</label><p id="m-designer"></p></div>
      <div class="modal-field"><label>시공사</label><p id="m-contractor"></p></div>
      <div class="modal-field"><label>설비사</label><p id="m-mep"></p></div>
      <div class="modal-field"><label>발주처</label><p id="m-client"></p></div>
    </div>
    <div class="modal-section-title">진행사항</div>
    <div class="modal-status" id="m-status"></div>
  </div>
</div>

const urgencyOrder = {긴급:0,중요:1,보통:2,여유:3,미정:4};
const urgencyEmoji = {긴급:'🔴',중요:'🟠',보통:'🟡',여유:'🟢',미정:'⚪'};
let filters = {section:'ALL', urgency:'ALL', designer:'ALL', contractor:'ALL', company:'ALL'};
let isTableView = false;

function buildFilters() {
  const designers   = [...new Set(RAW.map(d=>d.designer).filter(Boolean))].sort();
  const contractors = [...new Set(RAW.map(d=>d.contractor).filter(Boolean))].sort();
  const companies   = [...new Set(RAW.map(d=>d.company).filter(Boolean))].sort();

  function addBtns(containerId, filterKey, values) {
    const el = document.getElementById(containerId);
    values.forEach(v => {
      const b = document.createElement('button');
      b.className='btn'; b.dataset.filter=filterKey; b.dataset.value=v;
      b.textContent=v; b.onclick=()=>setFilter(b); el.appendChild(b);
    });
  }
  addBtns('designer-filters',   'designer',   designers);
  addBtns('contractor-filters', 'contractor', contractors);
  addBtns('company-filters',    'company',    companies);
}

function setFilter(btn) {
  filters[btn.dataset.filter] = btn.dataset.value;
  btn.parentElement.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getFiltered() {
  let d = RAW;
  if (filters.section    !== 'ALL') d = d.filter(x=>x.section===filters.section);
  if (filters.urgency    !== 'ALL') d = d.filter(x=>x.urgency===filters.urgency);
  if (filters.designer   !== 'ALL') d = d.filter(x=>x.designer===filters.designer);
  if (filters.contractor !== 'ALL') d = d.filter(x=>x.contractor===filters.contractor);
  if (filters.company    !== 'ALL') d = d.filter(x=>x.company===filters.company);
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (q) d = d.filter(x =>
    x.project.toLowerCase().includes(q) ||
    x.designer.toLowerCase().includes(q) ||
    x.contractor.toLowerCase().includes(q) ||
    x.client.toLowerCase().includes(q) ||
    x.mep.toLowerCase().includes(q)
  );
  const sort = document.getElementById('sort-select').value;
  if (sort==='urgency') {
    d = [...d].sort((a,b) => {
      const ua=urgencyOrder[a.urgency]??5, ub=urgencyOrder[b.urgency]??5;
      return ua!==ub ? ua-ub : a.completion_num-b.completion_num;
    });
  } else if (sort==='section') {
    const so={현장영업:0,설계영업:1,견적영업:2};
    d = [...d].sort((a,b)=>(so[a.section]??3)-(so[b.section]??3));
  } else {
    d = [...d].sort((a,b)=>a.project.localeCompare(b.project,'ko'));
  }
  return d;
}

function updateStats() {
  const c={현장영업:0,설계영업:0,견적영업:0};
  RAW.forEach(d=>{if(c[d.section]!==undefined)c[d.section]++;});
  document.getElementById('total-count').textContent  = RAW.length;
  document.getElementById('field-count').textContent  = c['현장영업'];
  document.getElementById('design-count').textContent = c['설계영업'];
  document.getElementById('estimate-count').textContent = c['견적영업'];
}

function render() {
  const filtered = getFiltered();
  document.getElementById('result-count').textContent = filtered.length;
  document.getElementById('no-results').style.display = filtered.length===0 ? 'block' : 'none';
  updateStats();
  isTableView ? renderTable(filtered) : renderCards(filtered);
}

function renderCards(filtered) {
  const cl = document.getElementById('card-list');
  cl.innerHTML = filtered.map(d => {
    const ue = urgencyEmoji[d.urgency]||'⚪';
    const ss = d.status_short ? d.status_short.substring(0,120)+(d.status_short.length>120?'…':'') : '';
    const idx = RAW.indexOf(d);
    return `<div class="card" onclick="openModal(${idx})">
      <div class="card-top">
        <div>
          <div class="card-title">${d.project||'-'}</div>
          <div class="card-company">${d.company||''}</div>
        </div>
        <div class="card-badges">
          <span class="tag-section tag-${d.section}">${d.section}</span>
          <span class="urgency-badge u-${d.urgency}">${ue} ${d.urgency}</span>
        </div>
      </div>
      <div class="card-meta">
        <div class="card-meta-item"><b>준공</b> ${d.completion||'미정'}</div>
        ${d.designer  ? `<div class="card-meta-item"><b>설계</b> ${d.designer}</div>` : ''}
        ${d.contractor? `<div class="card-meta-item"><b>시공</b> ${d.contractor}</div>` : ''}
        ${d.mep       ? `<div class="card-meta-item"><b>설비</b> ${d.mep}</div>` : ''}
      </div>
      ${ss ? `<div class="card-status">${ss}</div>` : ''}
    </div>`;
  }).join('');
}

function renderTable(filtered) {
  const tb = document.getElementById('table-body');
  tb.innerHTML = filtered.map(d => {
    const ue  = urgencyEmoji[d.urgency]||'⚪';
    const idx = RAW.indexOf(d);
    const ss  = d.status_short ? d.status_short.substring(0,100)+(d.status_short.length>100?'…':'') : '-';
    return `<tr onclick="openModal(${idx})">
      <td><span class="tag-section tag-${d.section}">${d.section}</span></td>
      <td><span class="urgency-badge u-${d.urgency}">${ue} ${d.urgency}</span></td>
      <td><b style="color:#d8e8ff">${d.project||'-'}</b><br><small style="color:#5a6a8a">${d.company||''}</small></td>
      <td style="color:#8bafd4;white-space:nowrap">${d.completion||'-'}</td>
      <td><span style="color:#8bafd4">${d.designer||'-'}</span><br><small style="color:#4e5e7a">${d.designer_contact||''}</small></td>
      <td><span style="color:#8bafd4">${d.contractor||'-'}</span><br><small style="color:#4e5e7a">${d.contractor_contact||''}</small></td>
      <td style="font-size:11px;color:#7090b0">${d.mep||'-'}</td>
      <td style="font-size:11px;color:#607090">${d.building_type||'-'}</td>
      <td><div class="status-text">${ss}</div></td>
    </tr>`;
  }).join('');
}

function toggleView() {
  isTableView = !isTableView;
  document.getElementById('card-list').style.display  = isTableView ? 'none'  : 'flex';
  document.getElementById('table-wrap').style.display = isTableView ? 'block' : 'none';
  document.getElementById('view-btn').textContent     = isTableView ? '📱 카드뷰' : '📋 테이블뷰';
  render();
}

function openModal(idx) {
  const d  = RAW[idx];
  const ue = urgencyEmoji[d.urgency]||'⚪';
  document.getElementById('modal-title').textContent   = d.project;
  document.getElementById('m-section').innerHTML       = `<span class="tag-section tag-${d.section}">${d.section}</span>`;
  document.getElementById('m-urgency').innerHTML       = `<span class="urgency-badge u-${d.urgency}">${ue} ${d.urgency}</span>  ${d.completion||'미정'}`;
  document.getElementById('m-company').textContent     = d.company||'-';
  document.getElementById('m-building').textContent    = (d.building_type||'-')+(d.area?' / '+d.area:'');
  document.getElementById('m-control').textContent     = d.control||'-';
  document.getElementById('m-mfd').textContent         = d.mfd_qty||'-';
  document.getElementById('m-designer').innerHTML      = `<b>${d.designer||'-'}</b><br><small style="color:#5a6a8a">${d.designer_contact||''}</small>`;
  document.getElementById('m-contractor').innerHTML    = `<b>${d.contractor||'-'}</b><br><small style="color:#5a6a8a">${d.contractor_contact||''}</small>`;
  document.getElementById('m-mep').textContent         = d.mep||'-';
  document.getElementById('m-client').textContent      = d.client||'-';
  document.getElementById('m-status').textContent      = d.status_full||'-';
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) { if(e.target===document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModalDirect(); });

loadData();

async function loadData() {
  try {
    const r = await fetch(RAW_URL + '?t=' + Date.now());
    const data = await r.json();
    RAW = data.projects || data;
    buildFilters();
    render();
  } catch(e) {
    document.getElementById('card-list').innerHTML = '<div class="no-results">❌ 데이터 로딩 실패: ' + e.message + '</div>';
  }
}
</script>
</body>
</html>
